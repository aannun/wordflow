<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Lettore RSVP: mostra i libri una parola alla volta al centro dello schermo.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">

  <!--
    Deliberately NOT using viewport-fit=cover + black-translucent here.
    That combination draws content under the iOS status bar/notch, but
    Flutter Web's safe-area (MediaQuery) detection in standalone/home-screen
    mode isn't reliable enough to compensate for it, leaving the top strip
    visually present but untappable (iOS still reserves it for system
    gestures). Using an opaque status bar instead makes iOS exclude that
    area from the viewport itself, so there's no mismatch to get wrong.
  -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="WordFlow">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>WordFlow</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      background: #000000;
      height: 100%;
      margin: 0;
    }
  </style>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
